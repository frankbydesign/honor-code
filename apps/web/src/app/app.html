<main class="container">
  <h1>Honor Code</h1>
  @if (!auth.hasChecked()) {
    <p>Loading…</p>
  } @else if (auth.isAuthenticated()) {
    <p>Signed in as {{ auth.currentUser()?.email }}.</p>
  } @else {
    <p>Not signed in.</p>
    <button type="button" (click)="login()">Sign in with Google</button>
  }
</main>
